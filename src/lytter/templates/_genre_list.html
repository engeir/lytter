{% if genres %}
  {% set max_score = genres[0].score %}
  {% for g in genres %}
    <div class="bar-chart-item bar-chart-item--no-index">
      <a href="/genre/{{ g.genre|urlencode }}" class="bar-chart-item-link">{{ loop.index }}. {{ g.genre }}</a>
      <div class="bar-chart-track">
        <div class="bar-chart-fill" style="width: {{ ((g.score / max_score) * 100)|round }}%;"></div>
      </div>
      <span class="bar-chart-value">{{ g.score|int }}</span>
    </div>
  {% endfor %}
{% else %}
  <p class="text-muted small mb-0">No genre data yet. Visit some artist pages to populate genres.</p>
{% endif %}
