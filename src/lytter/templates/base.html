<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      {% block title %}Last.fm Stats{% endblock %}
    </title>

    <!-- External Libraries -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link href="/static/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">🎵 Last.fm Stats</a>
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#main-nav"
                aria-controls="main-nav"
                aria-expanded="false"
                aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="main-nav">
          <div class="navbar-nav me-auto">
            <a class="nav-link" href="/all-time">All Time</a>
            <a class="nav-link" href="/yearly">Yearly Stats</a>
            <a class="nav-link" href="/duration-stats">Duration Stats</a>
            <a class="nav-link" href="/genre-stats">Genre Stats</a>
            <a class="nav-link" href="/discovery">Discovery</a>
            <a class="nav-link" href="/artist-stats">Artist Stats</a>
            <a class="nav-link" href="/compare">Compare</a>
          </div>
          <div class="navbar-nav">
            <div class="position-relative" style="width: 300px;">
              <input type="search" id="artist-search" class="form-control" placeholder="Search artists, albums, songs..." autocomplete="off">
              <div id="search-results"
                   class="position-absolute w-100 mt-1"
                   style="z-index: 1050;
                          display: none;
                          max-height: 400px;
                          overflow-y: auto"></div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Artist Search Functionality -->
    <script>
    (function() {
        let searchTimeout;
        const searchInput = document.getElementById('artist-search');
        const searchResults = document.getElementById('search-results');

        if (!searchInput || !searchResults) return;

        // Debounced search function
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();

            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            searchTimeout = setTimeout(() => {
                fetch(`/api/search/all?q=${encodeURIComponent(query)}&limit=5`)
                    .then(res => res.json())
                    .then(data => {
                        const sections = [];

                        if (data.artists.length > 0) {
                            sections.push('<div class="search-section-header">Artists</div>');
                            sections.push(...data.artists.map(a => `
                                <a href="/artist/${encodeURIComponent(a.artist)}" class="search-result-item">
                                    <span style="font-weight: 500;">${escapeHtml(a.artist)}</span>
                                    <span class="badge bg-primary">${a.plays.toLocaleString()}</span>
                                </a>`));
                        }
                        if (data.albums.length > 0) {
                            sections.push('<div class="search-section-header">Albums</div>');
                            sections.push(...data.albums.map(a => `
                                <a href="/album/${encodeURIComponent(a.artist)}/${encodeURIComponent(a.album)}" class="search-result-item">
                                    <span style="font-weight: 500;">${escapeHtml(a.album)}</span>
                                    <span style="color: var(--text-secondary); font-size: 0.85rem;">${escapeHtml(a.artist)}</span>
                                </a>`));
                        }
                        if (data.tracks.length > 0) {
                            sections.push('<div class="search-section-header">Songs</div>');
                            sections.push(...data.tracks.map(t => `
                                <a href="/song/${encodeURIComponent(t.artist)}/${encodeURIComponent(t.track)}" class="search-result-item">
                                    <span style="font-weight: 500;">${escapeHtml(t.track)}</span>
                                    <span style="color: var(--text-secondary); font-size: 0.85rem;">${escapeHtml(t.artist)}</span>
                                </a>`));
                        }

                        searchResults.innerHTML = sections.length
                            ? sections.join('')
                            : '<div class="search-no-results">No results found</div>';
                        searchResults.style.display = 'block';
                    })
                    .catch(error => {
                        console.error('Search error:', error);
                        searchResults.innerHTML = '<div class="search-no-results">Search error</div>';
                        searchResults.style.display = 'block';
                    });
            }, 300); // 300ms debounce
        });

        // Close results when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.style.display = 'none';
            }
        });

        // Clear search on Escape key
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                searchResults.style.display = 'none';
            }
        });

        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    })();
    </script>

    {% block scripts %}{% endblock %}
  </body>
</html>
